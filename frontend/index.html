<!DOCTYPE html>
<html>
<head>
    <title>Ticket Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-container">
        <div class="top-bar">
            <h1>Ticket Management System</h1>

            <div>
                
                <button onclick="logout()">Logout</button>
            </div>
            
        </div>
      

        <div class="nav-links">
        <button onclick="window.location.href='tickets.html'">
            Tickets
        </button>
    </div>

        <div class="section">
            <h2>Create Project</h2>

            <div class="project-form">
                <input id="projectName" placeholder="Project name">
                <input id="projectDescription" placeholder="Description">
                <input id="createdBy" placeholder="Created By User ID">
                <button onclick="createProject()">Create Project</button>
            </div>
        </div>

        <section class="section">
            <h2>Dashboard Summary</h2>
            <div id="summary" class="summary-grid">Loading...</div>
        </section>

        <section class="section">
            <h2>Projects</h2>
            <ul id="projectList"></ul>
        </section>
    </div>

    <script>
        async function logout() {
            const refreshToken = localStorage.getItem("refresh_token");

            try {
                await fetch("http://127.0.0.1:8000/api/logout/", {
                    method: "POST",
                    headers: getAuthHeaders(),
                    body: JSON.stringify({
                        refresh: refreshToken
                    })
                });
            } catch (error) {
                console.log("Logout API error:", error);
            }

            localStorage.removeItem("access_token");
            localStorage.removeItem("refresh_token");
            localStorage.removeItem("user");

            window.location.href = "login.html";
        }

        function getAuthHeaders() {
            const token = localStorage.getItem("access_token");

            return {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            };
        }

        async function loadSummary() {
            const response = await fetch("http://127.0.0.1:8000/api/dashboard-summary/", {
                headers: getAuthHeaders()
            });

            const data = await response.json();

            document.getElementById("summary").innerHTML = `
                <p><strong>Total Projects:</strong> ${data.total_projects}</p>
                <p><strong>Total Tickets:</strong> ${data.total_tickets}</p>
                <p><strong>Open Tickets:</strong> ${data.open_tickets}</p>
                <p><strong>In Progress:</strong> ${data.in_progress_tickets}</p>
                <p><strong>Resolved:</strong> ${data.resolved_tickets}</p>
                <p><strong>Closed:</strong> ${data.closed_tickets}</p>
            `;
        }

        async function loadProjects() {
            const response = await fetch("http://127.0.0.1:8000/api/projects/", {
                headers: getAuthHeaders()
            });

            const projects = await response.json();

            const list = document.getElementById("projectList");
            list.innerHTML = "";

            projects.forEach(project => {
                const item = document.createElement("li");

                item.innerHTML = `
                    <b>${project.name}</b><br>
                    ${project.description}<br>
                    Project ID: ${project.id}
                    <hr>
                `;

                list.appendChild(item);
            });
        }

        async function createProject() {
            const name = document.getElementById("projectName").value;
            const description = document.getElementById("projectDescription").value;
            const createdBy = document.getElementById("createdBy").value;

            const response = await fetch("http://127.0.0.1:8000/api/projects/", {
                method: "POST",
                headers: getAuthHeaders(),
                body: JSON.stringify({
                    name: name,
                    description: description,
                    created_by: createdBy
                })
            });

            const data = await response.json();

            if (!response.ok) {
                alert(JSON.stringify(data));
                return;
            }

            document.getElementById("projectName").value = "";
            document.getElementById("projectDescription").value = "";
            document.getElementById("createdBy").value = "";

            loadSummary();
            loadProjects();
        }

        loadSummary();
        loadProjects();
    </script>
</body>
</html>
